
services:
  db:
    image: mysql:8.0
    container_name: inventory_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: inventory_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    container_name: inventory_web
    restart: always
    ports:
      - "5000:5000"
    environment:
      FLASK_APP: run.py
      FLASK_ENV: production
      SECRET_KEY: supersecretkey123
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: inventory_db
      DB_USER: root
      DB_PASSWORD: root123
    depends_on:
      - db

volumes:
  mysql_data:
