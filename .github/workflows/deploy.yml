name: Deploy to EC2

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy Application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export PATH=$PATH:/usr/bin:/usr/local/bin:/snap/bin

            # Fix ownership and safe directory
            sudo chown -R ubuntu:ubuntu /home/ubuntu/billdash-devops-project
            git config --global --add safe.directory /home/ubuntu/billdash-devops-project

            cd /home/ubuntu/billdash-devops-project

            echo ">>> Pulling latest code..."
            git pull origin main

            echo ">>> Restarting containers..."
            docker compose down
            docker compose up -d --build

            echo ">>> Running containers:"
            docker compose ps
