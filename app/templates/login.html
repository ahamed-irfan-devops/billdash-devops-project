{% extends "base.html" %}
{% block title %}Login — InvBill{% endblock %}
{% block login_content %}
<div class="login-wrapper">
  <div class="card shadow-lg" style="width:380px">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div style="font-size:2.5rem; color:#7c6af7;"><i class="bi bi-box-seam-fill"></i></div>
        <h4 class="fw-bold mt-2">InvBill</h4>
        <p class="text-muted small">Inventory & Billing System</p>
      </div>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
          <i class="bi bi-box-arrow-in-right me-1"></i> Login
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
